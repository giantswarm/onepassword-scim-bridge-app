project:
  branch: "[[ .Branch ]]"
  commit: "[[ .SHA ]]"

image:
  registry: gsoci.azurecr.io
  name: giantswarm/scim
  tag: v0.0.1
  pullPolicy: IfNotPresent

kyvernoPolicyExceptions:
  enabled: false
  namespace: ""

ciliumNetworkPolicy:
  enabled: true

scimsession: ""

# This top-level scim key is only present because we intend to contribute the HTTPRoute upstream, where this key would exist.
# If/when that happens, this configuration would move down into op-scim-bridge.scim.
scim:
  name: "onepassword-scim-bridge"
  # route defines the configuration for a Gateway API route resource
  route:
    enabled: true
    # kind sets the route kind (HTTPRoute, GRPCRoute, TCPRoute, TLSRoute, UDPRoute)
    kind: HTTPRoute
    annotations: {}
    labels: {}
    # hostnames defines the hostnames that this route should match
    hostnames: []
    #  - "scim.example.com"
    # parentRefs defines which Gateway(s) this route should attach to
    parentRefs: []
    #  - name: default-gateway
    #    namespace: envoy-gateway-system
    #    sectionName: https
    # rules defines the routing rules for this route
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
    filters: []

op-scim-bridge:
  scim:
    imageRepository: gsoci.azurecr.io/giantswarm/scim

    credentials:
      volume:
        enabled: false
      secrets:
        enabled: true
        name: onepassword-scim-bridge-credentials

    service:
      type: ClusterIP

    # Try to spread the bridge pod and redis. This is fragile because the inner chart has some static labels and some dynamic ones.
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - redis
                  - key: app.kubernetes.io/instance
                    operator: In
                    values:
                      - onepassword-scim-bridge
              topologyKey: "kubernetes.io/hostname"

    initContainerSecurityContext:
      allowPrivilegeEscalation: true
      capabilities:
        drop:
          - ALL
      privileged: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: false
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    podSecurityContext:
      fsGroup: 999
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
